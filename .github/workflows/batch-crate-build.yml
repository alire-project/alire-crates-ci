name: Crate Status

on:
  push:
    branches:
      - master
      - 'fix/batch'

defaults:
  run:
    shell: bash

jobs:

  build:
    name: ${{ matrix.os }}::${{ matrix.tag }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: 
          - macos-latest
          - ubuntu-latest
          - windows-latest
        tag:
          - centos-latest-community-latest
          - community-latest
          - debian-stable          
          - ubuntu-lts
          - ""
        exclude: # inclusions don't allow to add arrays of values to a scenario
          - os: macos-latest
            tag: centos-latest-community-latest
          - os: macos-latest
            tag: community-latest
          - os: macos-latest
            tag: debian-stable
          - os: macos-latest
            tag: ubuntu-lts
          - os: windows-latest
            tag: centos-latest-community-latest
          - os: windows-latest
            tag: community-latest
          - os: windows-latest
            tag: debian-stable
          - os: windows-latest
            tag: ubuntu-lts
          - os: ubuntu-latest
            tag: ""

    steps:
    - name: Check out repository
      uses: actions/checkout@v2
      with:
       submodules: recursive

    # Prepare test setup depending on platform

    - name: Pull docker image (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: docker pull alire/gnat:${{ matrix.tag }}

    - name: Set up GNAT toolchain (CE on Windows/MacOS)
      if: matrix.os != 'ubuntu-latest'
      uses: ada-actions/toolchain@dev
      with:
        distrib: community

    # Perform the actual tests

    - name: Run test script (Linux)
      if: matrix.os == 'ubuntu-latest'
      env:
        SETUP_NAME: ${{ matrix.tag }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: >
        docker run 
        -v${PWD}:/work -w /work
        -e "TAG=${{ matrix.tag }}"
        alire/gnat:${{ matrix.tag }} 
        ./scripts/test-oldest.bash

    - name: Run test script (Windows/MacOS)
      if: matrix.os != 'ubuntu-latest'
      run: ./scripts/test-oldest.bash
      env:
        SETUP_NAME: ${{ matrix.os }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Commit changes (unimplemented)